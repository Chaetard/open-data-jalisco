# Municipality configuration — TEMPLATE
#
# This file groups source slugs (from configs/sources/ or datasets/sources/)
# under a single municipality. The application does not hardcode any specific
# municipality; values here are placeholders.

slug: example-municipality
name: "<municipality-name>"
