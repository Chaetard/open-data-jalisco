# Source: Tequila (SAPUMU portal).
#
# Same system as Tala — the SAPUMU portal — but served from the municipality's
# own domain (tequilajalisco.gob.mx) instead of a *.sapumu.com subdomain. The
# document bucket and the embedded <level-content :content="..."> JSON payload
# are identical, so it reuses the `sapumu_content` scraper:
#   1. Fetches each URL listed under `content_pages` (no recursion).
#   2. Parses the embedded <level-content :content="..."> JSON in each.
#   3. Emits documents from grouped_media[].months[].files[].
#
# Discovery tool (no DB writes, no PDF downloads, conservative range):
#   uv run python -m open_data_jalisco.cli sapumu scan-content tequila \
#     --from-id 1 --to-id 100 --dry-run
#   uv run python -m open_data_jalisco.cli sapumu scan-content tequila \
#     --from-id 1 --to-id 100 --output datasets/sources/tequila_candidates.yaml
#
# Ingestion:
#   uv run python -m open_data_jalisco.cli ingest tequila --limit 20 --dry-run
#   uv run python -m open_data_jalisco.cli ingest tequila --limit 20

slug: tequila
name: "Tequila (SAPUMU portal)"
kind: municipal_portal
municipality: Tequila
official_url: "https://tequilajalisco.gob.mx/municipio/transparencia/articulo-8"
description: |
  Municipal source served from the SAPUMU portal (same platform as Tala),
  exposed under the municipality's own domain. Documents are listed through
  Laravel/Vue content pages of the form `/contenido/{id}`; each page carries a
  `<level-content :content="...">` JSON payload listing the attached files.
is_active: true

metadata:
  state: "Jalisco"
  country: "MX"

scraper:
  type: sapumu_content
  allowed_domains:
    - tequilajalisco.gob.mx
    - app-sapumu.sfo2.digitaloceanspaces.com
  document_extensions:
    - pdf
    - xlsx
    - xls
    - xlsm
    - csv
    - docx

  # Pages to parse during `ingest`. Add IDs discovered via `sapumu scan-content`.
  # 311 pages discovered via sapumu scan-content (IDs 1..510, articulo-8).
  content_pages:
